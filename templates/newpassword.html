<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:5px;
            background:#007bff;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        #msg{
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Create New Password</h2>

        <form id="passwordForm">
            <div class="form-group">
                <label>New Password</label>
                <input
                    type="password"
                    id="password"
                    required
                >
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input
                    type="password"
                    id="cpassword"
                    required
                >
            </div>

            <button type="submit">
                Update Password
            </button>
        </form>

        <p id="msg"></p>
    </div>

    <script>

        // token received from Flask URL
        const data = "{{ data }}";

        document
            .getElementById("passwordForm")
            .addEventListener(
                "submit",
                async function(event){

                    event.preventDefault();

                    const password =
                        document.getElementById("password").value;

                    const cpassword =
                        document.getElementById("cpassword").value;

                    if(password !== cpassword){
                        document.getElementById("msg").innerText =
                            "Passwords do not match";
                        return;
                    }

                    try{

                        console.log("Sending PUT request...");
                        console.log(data);

                        const response = await fetch(
                            `/newpassword/${encodeURIComponent(data)}`,
                            {
                                method:"PUT",
                                headers:{
                                    "Content-Type":"application/json"
                                },
                                body:JSON.stringify({
                                    password:password,
                                    cpassword:cpassword
                                })
                            }
                        );

                        const result = await response.json();

                        document.getElementById("msg").innerText =
                            result.message;

                    }
                    catch(error){

                        console.log(error);

                        document.getElementById("msg").innerText =
                            "Something went wrong";
                    }

                }
            );

    </script>

</body>
</html>
